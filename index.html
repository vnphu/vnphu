<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script src="vue.js"></script>
</head>
<body>
    
        <div id="app">
            <section class="one" >
                <div class="player">
                    <h3>You  </h3>
                    <!-- <h6> {{message}}</h6> -->
                   
                        <img src="abc.jpg" alt="">
                        <div class="heal">
                            <div class="heal-con" style="background-color: red;" :style="{width: playerheal + '%'}">
    
                            </div>
                        </div>
                </div>
                <div class="boss">
                    <h3>Boss</h3>
                        <img src="acc.jpg" alt="">
                        <div class="heal">
                            <div class="heal-con" style="background-color: red;" :style="{width: bossheal +'%'}">
    
                            </div>
                        </div>
                </div>
            </section>
            <section class="two" v-if="!gamestart">
                    <div class="start">
                        <button @click="start"> Start new game </button>
                    </div>
            </section>
            <section class="three" v-else="">
                    <button id="select1" @click="dam">Đấm</button>
                    <button id="select2" @click="da"> Đá</button>
                    <button id="select3" @click="hoimau">Hồi máu</button>
                    <button id="select4" @click="dauhang">Đầu hàng</button>
            </section>
            <section v-if="turns.length > 0">
                   <ul>
                        <li v-for="turn in turns" :key="turn" :class="{'player1': turn.isPlayer, 'player2': !turn.isPlayer}"> 
                        {{ turn.textLong }}
                    </li>
                   </ul>
            </section>
        </div>
    
</body>

<style >
    #app{
        width: 80%;
        margin: auto;
        display: block;
    
    }
    button{
        padding: 10px 20px;
    }
    .one, .two,.three{
        display: flex;
        justify-content: space-evenly;
        margin: 20px;
      
    }
    img{
            width: 200px;
            height: 300px;
        }
    .player, .boss{
        text-align: center;
    }
    .three{
        width: 600px;
        margin: auto;
    }
    .heal
    {
        border: 1px solid #333;
        height: 20px;
        width: 300px;
        background-color: white;
       
    }
    .heal-con{
            height: 100%;
        }
    .player1{
        background-image: linear-gradient(to top, #fbc2eb 0%, #a6c1ee 100%);
    }
    .player2{
        background-image: linear-gradient(to top, #37ecba 0%, #72afd3 100%);
    }
    ul{
        margin: auto;
        list-style: none;
        width: 300px;
    }
    </style>
    <script>
    var app = new Vue({
  el: '#app',
        data(){
        return{
            playerheal: 80,
            bossheal: 90,
            gamestart : false,
            message: '',
            turns: []
        }
        },
        methods: {
            start: function(){
                this.gamestart = true;
                this.playerheal = 100;
                this.bossheal = 100;
            },
            dam: function(){
                if(this.check()){
                    return;
                }   
                var damage= this.inputDamage(2,10);
                this.bossheal -= damage;
                this.turns.unshift({
                    isPlayer: true,
                    textLong: "Player đấm Boss: " + damage,
                });
                this.boss();
                this.message = 'Đấm';
            },
             da: function(){
                   if(this.check()){
                    return;
                }
                var damage = this.inputDamage(10,20);
                this.bossheal -= damage;
                this.turns.unshift({
                    isPlayer: true,
                    textLong: "Player đá Boss: " + damage,
                });
                this.boss();
                this.message = 'Đá';
            },
             hoimau: function(){
                 if(this.playerheal > 70){
                     return false;
                 }
                 else if (this.playerheal <=60){
                     this.playerheal += 10;
                     this.message = 'Hồi máu thành công';
                 }
                 else { this.message = 'Hồi máu thành công';
                     return this.playerheal =70;
                     
                 }
            },
             dauhang: function(){
                    this.gamestart =false;
                    this.turns= []
                    alert(' you lost')
            },
            inputDamage: function(Mindamage, Maxdamage){
                return Math.max(Math.floor(Math.random() * Maxdamage) +1 , Mindamage);
            },
            boss: function(){
                var damage = this.inputDamage(7,15);
                 this.playerheal -= damage;
                   this.turns.unshift({
                    isPlayer: false,
                    textLong: "Boss cắn: " + damage,
                })
    
                this.check();
            },
            check: function()
            {
                    if(this.bossheal <0){
                        if(confirm("you win! new game?"))
                        {
                            this.start();
                        }
                        else{
                            this.gamestart =false;
                        }
                     }
                     else if(this.playerheal <0)
                     {
                          if(confirm("you lost! new game?"))
                        {
                            this.start();
                        }
                        else{
                            this.gamestart =false;
                        }
                     }
            }
        }
    })
    
    </script>
</html>
